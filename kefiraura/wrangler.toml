name = "kefiraura"
type = "javascript"

[env.production]
name = "kefiraura-production"
routes = [
  { pattern = "kefiraura.pages.dev", zone_name = "pages.dev" }
]

[build]
command = "echo 'Using pre-built Hugo public folder'"
cwd = "./site"

[build.upload]
format = "service-worker"

[docs]
build_command = "hugo --minify"
output_dir = "public"
compatibility_date = "2024-01-01"
