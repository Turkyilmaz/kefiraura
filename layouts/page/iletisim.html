{{ define "content" }}

<section class="page-header">
    <div class="container">
        <h1>İletişim</h1>
        <p>Sorularınız, siparişleriniz veya önerileriniz için bize ulaşın</p>
    </div>
    <div class="page-header-blob">
        <svg viewBox="0 0 1440 80" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"><path d="M0,40 C180,80 360,0 540,40 C720,80 900,0 1080,40 C1260,80 1380,20 1440,40 L1440,80 L0,80 Z" fill="#f9f5f0"/></svg>
    </div>
    <!-- Kabarcıklar -->
    <div class="page-header-bubbles">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div>
    </div>
    <!-- Dalgalı alt geçiş -->
    <div class="page-header-wave">
        <svg viewBox="0 0 1440 80" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="display:block;width:100%;height:80px;">
            <path d="M0,20 C240,70 480,0 720,35 C960,70 1200,5 1440,30 L1440,80 L0,80 Z" fill="#f9f5f0" opacity="0.5"/>
            <path d="M0,40 C200,80 440,10 680,45 C920,80 1160,15 1440,50 L1440,80 L0,80 Z" fill="#f9f5f0"/>
        </svg>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="grid-2" style="align-items:start; gap:4rem;">

            <!-- İletişim Bilgileri -->
            <div>
                <span class="eyebrow" style="font-family:'Manrope',sans-serif; font-size:0.8rem; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--purple); margin-bottom:0.75rem; display:block;">Bize Ulaşın</span>
                <h2 style="margin-bottom:2rem;">Merhaba, Nasıl Yardımcı Olabiliriz?</h2>

                <div style="display:flex; flex-direction:column; gap:1.5rem;">
                    <div class="card" style="display:flex; align-items:center; gap:1.25rem; padding:1.5rem;">
                        <div class="card-icon" style="margin:0; flex-shrink:0;">📧</div>
                        <div>
                            <div style="font-family:'Manrope',sans-serif; font-size:0.8rem; font-weight:700; color:var(--gray); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.25rem;">E-posta</div>
                            <div style="font-size:1rem; color:var(--black-soft);">info@kefiraura.com</div>
                        </div>
                    </div>
                    <div class="card" style="display:flex; align-items:center; gap:1.25rem; padding:1.5rem;">
                        <div class="card-icon" style="margin:0; flex-shrink:0;">📱</div>
                        <div>
                            <div style="font-family:'Manrope',sans-serif; font-size:0.8rem; font-weight:700; color:var(--gray); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.25rem;">Instagram</div>
                            <div style="font-size:1rem; color:var(--black-soft);">@kefiraura</div>
                        </div>
                    </div>
                    <div class="card" style="display:flex; align-items:center; gap:1.25rem; padding:1.5rem;">
                        <div class="card-icon" style="margin:0; flex-shrink:0;">🌐</div>
                        <div>
                            <div style="font-family:'Manrope',sans-serif; font-size:0.8rem; font-weight:700; color:var(--gray); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:0.25rem;">Web</div>
                            <div style="font-size:1rem; color:var(--black-soft);">www.kefiraura.com</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Form -->
            <div class="contact-form">
                <h3 style="margin-bottom:1.5rem;">Mesaj Gönderin</h3>
                <form>
                    <div class="form-group">
                        <label>Adınız</label>
                        <input type="text" placeholder="Adınız Soyadınız">
                    </div>
                    <div class="form-group">
                        <label>E-posta</label>
                        <input type="email" placeholder="ornek@email.com">
                    </div>
                    <div class="form-group">
                        <label>Konu</label>
                        <input type="text" placeholder="Sipariş, bilgi, öneri...">
                    </div>
                    <div class="form-group">
                        <label>Mesajınız</label>
                        <textarea placeholder="Mesajınızı buraya yazın..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Gönder →</button>
                </form>
            </div>

        </div>
    </div>
</section>

{{ end }}
