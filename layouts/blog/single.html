{{ define "content" }}

<section class="page-header">
    <div class="container" style="position:relative; z-index:1;">
        <h1>{{ .Title }}</h1>
        <p>{{ .Date.Format "02 January 2006" }}</p>
    </div>
    <div class="page-header-bubbles">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div>
    </div>
    <div class="page-header-wave">
        <svg viewBox="0 0 1440 80" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="display:block;width:100%;height:80px;">
            <path d="M0,20 C240,70 480,0 720,35 C960,70 1200,5 1440,30 L1440,80 L0,80 Z" fill="#f9f5f0" opacity="0.5"/>
            <path d="M0,40 C200,80 440,10 680,45 C920,80 1160,15 1440,50 L1440,80 L0,80 Z" fill="#f9f5f0"/>
        </svg>
    </div>
</section>

<section class="section">
    <div class="container">
        <div class="blog-post">
            <div class="blog-post-meta">
                {{ range .Params.tags }}<span class="blog-tag">{{ . }}</span>{{ end }}
            </div>
            <div class="blog-post-content prose">
                {{ .Content }}
            </div>
            <div class="blog-back">
                <a href="/blog/" class="btn btn-primary">← Tüm Yazılar</a>
            </div>
        </div>
    </div>
</section>

<style>
.blog-post { max-width: 780px; margin: 0 auto; }
.blog-post-meta { margin-bottom: 2rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
.blog-tag {
    font-family: 'Manrope', sans-serif; font-size: 0.78rem; font-weight: 700;
    background: rgba(147,24,122,0.08); color: var(--purple);
    padding: 0.3rem 0.8rem; border-radius: 50px;
}
.blog-post-content h2 { color: var(--purple); margin: 2rem 0 1rem; font-size: 1.4rem; }
.blog-post-content p { font-size: 1.05rem; color: #444; line-height: 1.8; margin-bottom: 1.25rem; }
.blog-post-content ul, .blog-post-content ol { padding-left: 1.5rem; margin-bottom: 1.25rem; }
.blog-post-content li { font-size: 1rem; color: #444; line-height: 1.8; margin-bottom: 0.4rem; }
.blog-post-content strong { color: var(--black); }
.blog-post-content em { color: var(--gray); }
.blog-back { margin-top: 3rem; }
</style>

{{ end }}
